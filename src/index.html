<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MacArdghail</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preload critical images -->
  <link rel="preload" as="image" href="/travelmap.png" fetchpriority="high">
  <link rel="preload" as="image" href="https://img.youtube.com/vi/op483l5s_dQ/maxresdefault.jpg" fetchpriority="high">
  
  <!-- Single Page Apps for GitHub Pages -->
  <script>
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>

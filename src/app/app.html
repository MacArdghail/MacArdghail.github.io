<div class="shell" [class.they-live-mode]="theyLiveMode()"> <!-- Outer container with 20px padding -->
  <div class="border-frame"> <!-- border/frame line -->
    <div class="page-content">
      <router-outlet />
    </div>
  </div>

  <!-- Custom cursor with trail -->
  <svg class="cursor-canvas" width="100%" height="100%" [class.hidden]="theyLiveMode()">
    <!-- Draw trail line through all points -->
    @if (cursorTrail().length > 0) {
      <path
        [attr.d]="getTrailPath()"
        stroke="#1a1a1a"
        stroke-width="2"
        fill="none"
        opacity="0.6"
      />
    }
    
    <!-- Cursor dot -->
    <circle
      [attr.cx]="cursorX()"
      [attr.cy]="cursorY()"
      r="6"
      fill="#1a1a1a"
    />
  </svg>

  <!-- THEY LIVE glasses button -->
  <div class="bottom-right">
    <button
      class="glasses-btn"
      (click)="toggleTheyLive()"
      aria-label="Put on the glasses"
    >
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" fill="white" d="M1.24 15.018c.24.239 1.438.957 1.677 1.675c.24.717.72 5.307 2.158 6.504c1.483 1.232 7.077.773 8.148.24c2.397-1.195 2.691-5.055 3.115-6.745c.239-.957 1.677-.957 1.677-.957s1.438 0 1.678.956c.424 1.691.72 5.562 3.115 6.755c1.072.535 6.666.994 8.151-.238c1.436-1.197 1.915-5.799 2.155-6.517c.238-.717 1.438-1.435 1.677-1.674c.241-.239.241-1.196 0-1.436c-.479-.478-6.134-.904-12.223-.239c-1.215.133-1.677.478-4.554.478c-2.875 0-3.339-.346-4.553-.478c-6.085-.664-11.741-.238-12.221.24c-.239.239-.239 1.197 0 1.436z"></path>
      </svg>
    </button>
  </div>

  <!-- THEY LIVE screen overlay -->
  <section class="they-live-screen" [class.visible]="theyLiveMode()">
    <div class="they-live-content">
      <p class="they-live-word" [class.glitch-transition]="isGlitching()" [attr.data-text]="theyLiveMessage()">{{ theyLiveMessage() }}</p>
    </div>
    <button class="they-live-glasses-btn" (click)="toggleTheyLive()">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" fill="#2b2b2b" d="M1.24 15.018c.24.239 1.438.957 1.677 1.675c.24.717.72 5.307 2.158 6.504c1.483 1.232 7.077.773 8.148.24c2.397-1.195 2.691-5.055 3.115-6.745c.239-.957 1.677-.957 1.677-.957s1.438 0 1.678.956c.424 1.691.72 5.562 3.115 6.755c1.072.535 6.666.994 8.151-.238c1.436-1.197 1.915-5.799 2.155-6.517c.238-.717 1.438-1.435 1.677-1.674c.241-.239.241-1.196 0-1.436c-.479-.478-6.134-.904-12.223-.239c-1.215.133-1.677.478-4.554.478c-2.875 0-3.339-.346-4.553-.478c-6.085-.664-11.741-.238-12.221.24c-.239.239-.239 1.197 0 1.436z"></path>
      </svg>
    </button>
  </section>
</div>
